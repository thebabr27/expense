        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        #formNewGameFromMate {
            display: none;
        }

        /* Overlay scacco matto */
        #checkMateOverlay.overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        #checkMateOverlay .overlay-content {
            text-align: center;
            background: #222;
            padding: 30px 50px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 0 20px black;
        }

        #checkMateOverlay .overlay-content h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        #checkMateOverlay .buttons button {
            margin: 0 10px;
        }

        .hidden {
            display: none !important;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.2);
            /* semitrasparente */
            color: white;
            font-size: 24px;
            font-weight: bold;

            display: flex;
            align-items: center;
            justify-content: center;

            z-index: 10;

            visibility: hidden;
            /* nascosto di default */
        }

        .hourglass.frame {
            position: absolute;
            width: 50px;
            height: 80px;
            /* centra esattamente */

            border-top: 6px solid white;
            border-bottom: 6px solid white;
            border-left: none;
            border-right: none;

            border-radius: 6px;
            box-sizing: border-box;
            z-index: 1010;
        }

        /* Clessidra */
        .hourglass {
            width: 45px;
            height: 65px;
            position: relative;
            animation: rotate 2s linear infinite;
        }

        /* Lati diagonali */
        .hourglass.frame::before,
        .hourglass.frame::after {
            content: '';
            position: absolute;
            width: 2px;
            /* spessore lato */
            height: 125%;
            /* tutta l’altezza della clessidra */
            top: 0;
            background: white;
        }

        /* lato sinistro */
        .hourglass.frame::before {
            left: 0;
            transform: rotate(-35deg);
            transform-origin: top left;
        }

        /* lato destro */
        .hourglass.frame::after {
            right: 0;
            transform: rotate(35deg);
            transform-origin: top right;
        }


        .hourglass:not(.frame)::before,
        .hourglass:not(.frame)::after {
            border-radius: 5px;
        }

        /* triangolo sopra */
        .hourglass:not(.frame)::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: #f5d27a;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            animation: sandTop 4s linear infinite;
        }

        /* triangolo sotto */
        .hourglass:not(.frame)::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: #f5d27a;
            clip-path: polygon(0 100%, 100% 100%, 50% 0);
            animation: sandBottom 4s linear infinite;
        }

        @keyframes sandBottom {

            /* inizialmente vuoto */
            0% {
                clip-path: polygon(0 100%, 100% 100%, 50% 0);
            }

            10% {
                clip-path: polygon(0 100%, 100% 100%, 50% 0);
            }

            /* durante il flip → ancora vuoto */
            25% {
                clip-path: polygon(50% 0, 50% 0, 50% 0);
            }

            35% {
                clip-path: polygon(50% 0, 50% 0, 50% 0);
            }

            50% {
                clip-path: polygon(0 100%, 100% 100%, 50% 0);
            }

            60% {
                clip-path: polygon(0 100%, 100% 100%, 50% 0);
            }

            75% {
                clip-path: polygon(50% 0, 50% 0, 50% 0);
            }

            85% {
                clip-path: polygon(50% 0, 50% 0, 50% 0);
            }

            /* fase ferma → si riempie */
            100% {
                clip-path: polygon(0 100%, 100% 100%, 50% 0);
            }
        }

        @keyframes sandTop {

            /* fase iniziale (prima del primo flip) */
            0% {
                clip-path: polygon(50% 100%, 50% 100%, 50% 100%);
            }

            10% {
                clip-path: polygon(50% 100%, 50% 100%, 50% 100%);
            }

            /* durante il flip → reset immediato */
            25% {
                clip-path: polygon(0 0, 100% 0, 50% 100%);
            }

            35% {
                clip-path: polygon(0 0, 100% 0, 50% 100%);
            }

            /* fase ferma → si svuota */
            50% {
                clip-path: polygon(50% 100%, 50% 100%, 50% 100%);
            }

            60% {
                clip-path: polygon(50% 100%, 50% 100%, 50% 100%);
            }

            /* secondo flip → reset */
            75% {
                clip-path: polygon(0 0, 100% 0, 50% 100%);
            }

            85% {
                clip-path: polygon(0 0, 100% 0, 50% 100%);
            }

            /* seconda fase ferma → si svuota */
            100% {
                clip-path: polygon(50% 100%, 50% 100%, 50% 100%);
            }
        }

        /* Rotazione */
        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(180deg);
            }

            50% {
                transform: rotate(180deg);
            }

            75% {
                transform: rotate(360deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #overlay.active {
            visibility: visible;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        #board {
            max-width: 600px;
        }

        .bg {
            background-color: #b79735 !important
        }

        .disabled {
            pointer-events: none;
            /* Non cliccabile */
            opacity: 0.8;
            /* Opaco per evidenza */
        }


        h1 {
            margin-top: 10px;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            width: 10.5%;
            display: flex;
            cursor: pointer;
        }

        .suicide {
            background-color: rgba(255, 0, 0, 0.64) !important;
            border: 2px dotted rgba(0, 0, 0, 0.6);
            box-sizing: border-box;
            pointer-events: none;
        }

        .highlight {
            background-color: rgb(38 255 0 / 64%) !important;
            border: 2px dotted rgba(0, 0, 0, 0.6);
            box-sizing: border-box;
        }

        .white {
            background-color: #f0d9b5;
        }

        .black {
            background-color: #b58863;
        }

        #turn {
            margin: 15px;
            font-weight: bold;
        }
    </style>
</head>

        // Funzione che controlla se l'utente è già in una partita
        async function checkUserInGame(userEmail) {
            const chessRef = ref(db, '/chess');  // tutti i giochi
            const snapshot = await get(chessRef);

            if (!snapshot.exists()) {
                console.log("Non ci sono partite nel database.");
                return null; // nessuna partita
            }

            const games = snapshot.val();
            console.log(games)

            // Cerca tra tutte le partite
            for (const gameId in games) {
                const game = games[gameId];
                if (!game.players) continue;

                if (game.players.white === userEmail || game.players.black === userEmail) {
                    console.log(`Utente già in partita: ${gameId}`, game);
                    handleGameClick(gameId, userEmail)
                } else {
                    console.log("Utente non è in nessuna partita.");
                    return null; // non trovato
                }
            }
        }

        async function joinGame(gameId, userEmail) {
            const gameRef = ref(db, `/chess/${gameId}`);
            const snapshot = await get(gameRef);

            if (!snapshot.exists()) {
                console.log("Partita non trovata");
                return;
            }

            const game = snapshot.val();

            if (!game.players) {
                game.players = {};
            }

            // Se l'utente è già dentro, non fare nulla
            if (game.players.white === userEmail || game.players.black === userEmail) {
                console.log("Sei già in questa partita");
                hide([games])
                return;
            }

            // Inserisce nel primo slot libero

                game.players.white = userEmail;
                console.log("Entrato come WHITE");
                hide([games])
            } else if (!game.players.black) {
                game.players.black = userEmail;
                console.log("Entrato come BLACK");
                hide([games])
            } else {
                console.log("Partita piena");
                return;
            }

            // Salva aggiornamento
            await set(gameRef, game);

            console.log("Giocatori aggiornati:", game.players);
        }

            gameId = modalInput.value;

            console.log(initialState, gameId)
            await set(gameRef, initialState);
            /* if (!snapshot.exists() || userId === 0) {

                await set(gameRef, initialState);
                return initialState;
            }
            return snapshot.val(); */
        }

        async function getChessStateOnce() { const snap = await get(gameRef); return snap.exists() ? snap.val() : null; }

        // ===== HANDLE CLICK =====
        async function handleClick(e, userId) {
            const sq = e.target.closest(".square");
            if (!sq) return;

            const row = parseInt(sq.dataset.row);
            const col = parseInt(sq.dataset.col);

            const chessState = await getChessStateOnce();
            if (!chessState) return;

            const userColor =
                chessState.players.white === userId ? "white" :
                    chessState.players.black === userId ? "black" : null;


            console.log(row, col, chessState, userColor, userId)
            if (!userColor || chessState.turn !== userColor) return;

            const piece = chessState.board[row][col];

            // =========================
            // 👉 PRIMO CLICK (selezione)
            // =========================
            if (!selected) {
                if (piece && isCorrectTurn(piece, chessState.turn)) {
                    selected = { row, col };
                    highlightMoves(row, col, chessState.board);
                }
                return;
            }

            // =========================
            // 👉 CLICK STESSA CASELLA → annulla
            // =========================
            if (selected.row === row && selected.col === col) {
                selected = null;
                clearHighlights();
                return;
            }

            const fromRow = selected.row;
            const fromCol = selected.col;
            const fromPiece = chessState.board[fromRow][fromCol];

            // =========================
            // 👉 CAMBIO SELEZIONE (clicco altro mio pezzo)
            // =========================
            if (piece && isCorrectTurn(piece, chessState.turn)) {
                selected = { row, col };
                highlightMoves(row, col, chessState.board);
                return;
            }

            // =========================
            // 👉 MOSSA (vuota o cattura)
            // =========================
            if (isValidMove(fromRow, fromCol, row, col, chessState.board)) {
                // controllo che non sia suicida
                if (isSuicideMove(fromRow, fromCol, row, col, chessState.board, userColor)) {
                    alert("Mossa non valida: il re verrebbe messo sotto scacco!");
                    return;
                }

                // eseguo la mossa
                chessState.board[row][col] = fromPiece;
                chessState.board[fromRow][fromCol] = "";

                // cambio turno
                chessState.turn = chessState.turn === "white" ? "black" : "white";

                // reset selezione / evidenziazione
                selected = null;
                clearHighlights();

                await saveChessState(chessState);
                drawBoard(userId, chessState);
                return;
            }

            // =========================
            // 👉 CLICK NON VALIDO → reset
            // =========================
            selected = null;
            clearHighlights();
        }

        function saveChessState(state) { return set(gameRef, state); }

        function clearHighlights() {
            document.querySelectorAll(".highlight").forEach(el => el.classList.remove("highlight"));
            document.querySelectorAll(".disabled").forEach(el => el.classList.remove("disabled"));
            document.querySelectorAll(".suicide").forEach(el => el.classList.remove("suicide"));
        }

        function drawBoard(userId, chessState) {
            console.log(chessState)

            checkElement.textContent = "";
            if (!chessState || !chessState.board) return;

            const userColor =
                chessState.players.white === userId ? "white" :
                    chessState.players.black === userId ? "black" : null;
            const currentTurn = chessState.turn; // "white" o "black"
            const currentPlayerEmail = chessState.players[currentTurn] || "Sconosciuto";

            const playerInCheckmate = isCheckmate(chessState.board, currentTurn);

            if (playerInCheckmate) {
                // chi ha vinto? L’altro giocatore 
                if (chessState.players[currentTurn]) {
                    showCheckmateOverlay(chessState.players[currentTurn]);
                }
            } else {
                hideCheckmateOverlay();
            }

            // scegli icona scacco
            const pieceIcon = currentTurn === "white" ? "♔" : "♚";

            turnElement.innerHTML = currentTurn === "white"
                ? `Tocca a ${currentPlayerEmail} <span class="text-light">${pieceIcon}</span>`
                : `Tocca a ${currentPlayerEmail} <span>${pieceIcon}</span>`;

            const inCheck = isCheck(chessState.board, currentTurn);
            const inCheckmate = isCheckmate(chessState.board, currentTurn);

            if (inCheckmate) {
                checkElement.textContent = `♔ Scacco matto!`;
            } else if (inCheck) {
                checkElement.textContent = `♔ Scacco!`;
            } else {
                checkElement.textContent = "";
            }

            const isMyTurn = userColor && chessState.turn === userColor;

            if (!isMyTurn && !selected) {
                overlay.classList.add("active");
            } else {
                overlay.classList.remove("active");
            }

            boardElement.innerHTML = "";

            // 🔁 8 righe
            for (let r = 0; r < 8; r++) {

                const row = document.createElement("div");
                row.className = "w-100 d-flex";

                // bordo sinistro (vuoto o futuro uso coordinate)
                const leftBorder = document.createElement("div");
                leftBorder.style.width = "8%";
                row.appendChild(leftBorder);

                // ♟️ celle scacchiera
                for (let c = 0; c < 8; c++) {

                    const sq = document.createElement("div");

                    sq.style.width = "10.5%";
                    sq.classList.add(
                        "square",
                        (r + c) % 2 === 0 ? "white" : "black"
                    );

                    sq.dataset.row = r;
                    sq.dataset.col = c;

                    const piece = chessState.board[r][c];
                    if (piece) {
                        sq.innerHTML = `<img src="${pieces[piece]}" style="width:80%;height:80%;">`;
                    }

                    sq.addEventListener("click", e => handleClick(e, currentUser.email));

                    row.appendChild(sq);
                }

                // bordo destro
                const rightBorder = document.createElement("div");
                rightBorder.style.width = "8%";
                row.appendChild(rightBorder);

                boardElement.appendChild(row);
            }
        }

        // ===== HIGHLIGHT MOVES =====
        async function highlightMoves(row, col, board) {
            const userId = auth.currentUser.uid;
            const chessState = await getChessStateOnce();
            const userColor = chessState.turn;

            drawBoard(userId, chessState); // redraw

            document.querySelectorAll(".square").forEach(sq => {
                const r = parseInt(sq.dataset.row), c = parseInt(sq.dataset.col);

                // rimuovi tutte le classi prima
                sq.classList.remove("highlight", "disabled", "suicide");

                if (isValidMove(row, col, r, c, board)) {
                    // controllo se mossa sarebbe suicida
                    if (isSuicideMove(row, col, r, c, board, userColor)) {
                        sq.classList.add("suicide"); // mossa valida ma pericolosa
                    } else {
                        sq.classList.add("highlight"); // mossa valida e sicura
                    }
                } else if (board[r][c] &&
                    ((board[r][c] === board[r][c].toUpperCase() && userColor === "white") ||
                        (board[r][c] === board[r][c].toLowerCase() && userColor === "black"))) {
                    // pezzi miei → non evidenziare
                } else {
                    sq.classList.add("disabled"); // mossa non valida
                }
            });
        }

        // ===== CHECK / CHECKMATE =====
        function findKing(board, color) { const king = color === "white" ? "K" : "k"; for (let r = 0; r < 8; r++) { for (let c = 0; c < 8; c++) { if (board[r][c] === king) return { row: r, col: c } } return null } }
        function isSquareAttacked(board, row, col, attackerColor) { for (let r = 0; r < 8; r++) { for (let c = 0; c < 8; c++) { const piece = board[r][c]; if (!piece) continue; const pieceColor = piece === piece.toUpperCase() ? "white" : "black"; if (pieceColor !== attackerColor) continue; if (isValidMove(r, c, row, col, board)) return true } } return false }
        function isCheck(board, color) {
            // trova il re del colore
            const kingChar = color === "white" ? "K" : "k";
            let kingPos = null;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c] === kingChar) {
                        kingPos = { row: r, col: c };
                        break;
                    }
                }
                if (kingPos) break;
            }
            if (!kingPos) return false; // errore: re non trovato

            // controlla tutte le mosse dell’avversario
            const opponentColor = color === "white" ? "black" : "white";
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = board[r][c];
                    if (!piece) continue;
                    if (opponentColor === "white" ? piece === piece.toUpperCase() : piece === piece.toLowerCase()) {
                        // verifica se il pezzo può attaccare il re
                        if (isValidMove(r, c, kingPos.row, kingPos.col, board, true)) {
                            return true;
                        }
                    }
                }
            }

            return false;
        }
        /**
 * Controlla se il giocatore color è in scacco matto
 * board: matrice 8x8
 * color: "white" o "black"
 */
        /**
 * Controlla se il giocatore color è in scacco matto
 * board: matrice 8x8
 * color: "white" o "black"
 */
        function isCheckmate(board, color) {
            // 1️⃣ Se il re NON è in scacco → non è scacco matto
            if (!isCheck(board, color)) return false;

            const possibleMoves = []; // array per memorizzare le mosse valide

            // 2️⃣ Ciclo su tutti i pezzi del giocatore
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = board[r][c];
                    if (!piece) continue;

                    // solo i pezzi del giocatore
                    if ((color === "white" && piece === piece.toUpperCase()) ||
                        (color === "black" && piece === piece.toLowerCase())) {

                        // prova tutte le possibili mosse su tutta la scacchiera
                        for (let tr = 0; tr < 8; tr++) {
                            for (let tc = 0; tc < 8; tc++) {
                                if (isValidMove(r, c, tr, tc, board)) {
                                    // verifica se la mossa è sicura
                                    if (!isSuicideMove(r, c, tr, tc, board, color)) {
                                        possibleMoves.push({ from: [r, c], to: [tr, tc], piece });
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // stampa le mosse ancora possibili
            if (possibleMoves.length > 0) {
                console.log(`Mosse legali per ${color}:`, possibleMoves);
                return false; // non è scacco matto
            } else {
                console.log(`${color} è in scacco matto!`);
                return true; // scacco matto
            }
        }

        // ===== UTILS =====
        /**
 * Controlla se muovere un pezzo da (fromRow, fromCol) a (toRow, toCol)
 * lascerebbe il re del giocatore sotto scacco
 */
        function isSuicideMove(fromRow, fromCol, toRow, toCol, board, playerColor) {
            // 1️⃣ Clona la board per simulare la mossa
            const simulatedBoard = board.map(row => [...row]);

            // Muovi il pezzo
            simulatedBoard[toRow][toCol] = simulatedBoard[fromRow][fromCol];
            simulatedBoard[fromRow][fromCol] = "";

            // 2️⃣ Controlla se il re del playerColor è sotto scacco dopo la mossa
            return isCheck(simulatedBoard, playerColor);
        }
        function isCorrectTurn(piece, turn) { return (turn === "white" && piece === piece.toUpperCase()) || (turn === "black" && piece === piece.toLowerCase()) }
        function isValidMove(sr, sc, dr, dc, board) { const piece = board[sr][sc]; if (!piece) return false; const target = board[dr][dc]; if (target && ((piece === piece.toUpperCase() && target === target.toUpperCase()) || (piece === piece.toLowerCase() && target === target.toLowerCase()))) return false; const dx = dr - sr, dy = dc - sc; switch (piece.toLowerCase()) { case "p": const dir = piece === "P" ? -1 : 1; if (dy === 0 && !target) { if (dx === dir) return true; if ((sr === 6 && piece === "P" || sr === 1 && piece === "p") && dx === 2 * dir && !board[sr + dir][sc]) return true } if (Math.abs(dy) === 1 && dx === dir && target) return true; break; case "r": if (dx === 0 || dy === 0) return clearPath(sr, sc, dr, dc, board); break; case "n": if ((Math.abs(dx) === 2 && Math.abs(dy) === 1) || (Math.abs(dx) === 1 && Math.abs(dy) === 2)) return true; break; case "b": if (Math.abs(dx) === Math.abs(dy)) return clearPath(sr, sc, dr, dc, board); break; case "q": if (dx === 0 || dy === 0 || Math.abs(dx) === Math.abs(dy)) return clearPath(sr, sc, dr, dc, board); break; case "k": if (Math.abs(dx) <= 1 && Math.abs(dy) <= 1) return true }return false }
        function clearPath(sr, sc, dr, dc, board) { const stepX = Math.sign(dr - sr), stepY = Math.sign(dc - sc); let r = sr + stepX, c = sc + stepY; while (r !== dr || c !== dc) { if (board[r][c] !== "") return false; r += stepX; c += stepY } return true }


        function show(elements) {
            for (let element of elements) {
                element.style.display = "block";
            }
        }

        function hide(elements) {
            for (let element of elements) {
                element.style.display = "none";
            }
        }

    </script>
