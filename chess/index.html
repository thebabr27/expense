        #overlay {

            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background: rgba(0, 0, 0, 0.4);

            color: white;

            display: flex;
            align-items: center;

            z-index: 10;

            visibility: hidden;
            /* nascosto di default */
        }

        .hourglass.frame {
            position: absolute;
            width: 50px;
            height: 80px;
            /* centra esattamente */

            border-top: 6px solid white;
            border-bottom: 6px solid white;
            border-left: none;
            border-right: none;

            border-radius: 6px;
            box-sizing: border-box;
            z-index: 1010;
        }

        /* Clessidra */
        .hourglass {
            width: 45px;
            height: 65px;
            position: relative;
            animation: rotate 2s linear infinite;
        }

        /* Lati diagonali */
        .hourglass.frame::before,
        .hourglass.frame::after {
            content: '';
            position: absolute;
            width: 2px;
            /* spessore lato */
            height: 125%;
            /* tutta l’altezza della clessidra */
            top: 0;
            background: white;
        }

        /* lato sinistro */
        .hourglass.frame::before {
            left: 0;
            transform: rotate(-35deg);
            transform-origin: top left;
        }

        /* lato destro */
        .hourglass.frame::after {
            right: 0;
            transform: rotate(35deg);
            transform-origin: top right;
        }


        .hourglass:not(.frame)::before,
        .hourglass:not(.frame)::after {
            border-radius: 5px;
        }

        /* triangolo sopra */
        .hourglass:not(.frame)::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: #f5d27a;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
            animation: sandTop 4s linear infinite;
        }

        /* triangolo sotto */
        .hourglass:not(.frame)::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: #f5d27a;
            clip-path: polygon(0 100%, 100% 100%, 50% 0);
            animation: sandBottom 4s linear infinite;
        }

        @keyframes sandBottom {

            /* inizialmente vuoto */
            0% {
                clip-path: polygon(0 100%, 100% 100%, 50% 0);
            }

            10% {
                clip-path: polygon(0 100%, 100% 100%, 50% 0);
            }

            /* durante il flip → ancora vuoto */
            25% {
                clip-path: polygon(50% 0, 50% 0, 50% 0);
            }

            35% {
                clip-path: polygon(50% 0, 50% 0, 50% 0);
            }

            50% {
                clip-path: polygon(0 100%, 100% 100%, 50% 0);
            }

            60% {
                clip-path: polygon(0 100%, 100% 100%, 50% 0);
            }

            75% {
                clip-path: polygon(50% 0, 50% 0, 50% 0);
            }

            85% {
                clip-path: polygon(50% 0, 50% 0, 50% 0);
            }

            /* fase ferma → si riempie */
            100% {
                clip-path: polygon(0 100%, 100% 100%, 50% 0);
            }
        }

        @keyframes sandTop {

            /* fase iniziale (prima del primo flip) */
            0% {
                clip-path: polygon(50% 100%, 50% 100%, 50% 100%);
            }

            10% {
                clip-path: polygon(50% 100%, 50% 100%, 50% 100%);
            }

            /* durante il flip → reset immediato */
            25% {
                clip-path: polygon(0 0, 100% 0, 50% 100%);
            }

            35% {
                clip-path: polygon(0 0, 100% 0, 50% 100%);
            }

            /* fase ferma → si svuota */
            50% {
                clip-path: polygon(50% 100%, 50% 100%, 50% 100%);
            }

            60% {
                clip-path: polygon(50% 100%, 50% 100%, 50% 100%);
            }

            /* secondo flip → reset */
            75% {
                clip-path: polygon(0 0, 100% 0, 50% 100%);
            }

            85% {
                clip-path: polygon(0 0, 100% 0, 50% 100%);
            }

            /* seconda fase ferma → si svuota */
            100% {
                clip-path: polygon(50% 100%, 50% 100%, 50% 100%);
            }
        }

        /* Rotazione */
        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }

            25% {
                transform: rotate(180deg);
            }

            50% {
                transform: rotate(180deg);
            }

            75% {
                transform: rotate(360deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #overlay.active {

        // 👉 AI / Computer move

        async function makeComputerMove(chessState) {
            if (!chessState || !chessState.board) return;

            const computerColor = chessState.turn;
            const board = chessState.board;

            // 🔹 trova tutte le mosse valide
            const moves = getAllValidMoves(board, computerColor);

            if (moves.length === 0) {
                console.log("Computer non ha mosse valide!");
                return;
            }

            // 🔥 QUI entra la difficoltà
            const move = chooseMoveByDifficulty(moves, chessState);

            // 🔹 esegui mossa
            board[move.toRow][move.toCol] = move.piece;
            board[move.fromRow][move.fromCol] = "";

            // 🔹 history
            const moveText = `${pieceToText(move.piece)} in ${coordsToNotation(move.toRow, move.toCol)}`;
            if (!chessState.history) chessState.history = [];

            chessState.history.push({
                fromRow: move.fromRow,
                fromCol: move.fromCol,
                toRow: move.toRow,
                toCol: move.toCol,
                piece: move.piece,
                color: computerColor,
                text: moveText,
                time: Date.now()
            });

            // 🔹 cambio turno
            chessState.turn = computerColor === "white" ? "black" : "white";

            await saveChessState(chessState);
        }

        function getAllValidMoves(board, color) {
            const moves = [];

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = board[r][c];
                    if (!piece) continue;

                    const isMyPiece =
                        (color === "white" && piece === piece.toUpperCase()) ||
                        (color === "black" && piece === piece.toLowerCase());

                    if (!isMyPiece) continue;

                    for (let tr = 0; tr < 8; tr++) {
                        for (let tc = 0; tc < 8; tc++) {
                            if (
                                isValidMove(r, c, tr, tc, board) &&
                                !isSuicideMove(r, c, tr, tc, board, color)
                            ) {
                                moves.push({
                                    fromRow: r,
                                    fromCol: c,
                                    toRow: tr,
                                    toCol: tc,
                                    piece
                                });
                            }
                        }
                    }
                }
            }

            return moves;
        }
        function randomMove(moves) {
            return moves[Math.floor(Math.random() * moves.length)];
        }
        function mediumMove(moves) {
            const captureMoves = moves.filter(m => m.captured);

            if (captureMoves.length > 0) {
                return randomMove(captureMoves);
            }

            return randomMove(moves);
        }
        function hardMove(moves) {
            const pieceValue = {
                p: 1,
                n: 3,
                b: 3,
                r: 5,
                q: 9,
                k: 100
            };

            let bestMove = null;
            let bestScore = -Infinity;

            moves.forEach(move => {
                let score = 0;

                if (move.captured) {
                    score += pieceValue[move.captured.toLowerCase()] || 0;
                }

                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            });

            return bestMove || randomMove(moves);
        }
        function chooseMoveByDifficulty(moves, chessState) {
            const difficulty = chessState.pcDifficulty || "easy";

            switch (difficulty) {
                case "easy":
                    return randomMove(moves);

                case "medium":
                    return mediumMove(moves);

                case "hard":
                    return hardMove(moves);

                default:
                    return randomMove(moves);
            }
        }

                <span>♟ Nero</span>
            </label>
        </div>
    </div>
</div>
`;
                            document.getElementById('playAgainstPCBtn').addEventListener('click', () => {
                                overlay.classList.remove("active");

                        } else {

                        joinGame(gameId, userEmail)

                    } else {

        async function getChessStateOnce() { const snap = await get(gameRef); return snap.exists() ? snap.val() : null; }

        // ===== HANDLE CLICK =====
        async function handleClick(e, userId) {
            const sq = e.target.closest(".square");
            if (!sq) return;

            const row = parseInt(sq.dataset.row);
            const col = parseInt(sq.dataset.col);

            const chessState = await getChessStateOnce();
            if (!chessState) return;

            const userColor =
                chessState.players.white === userId ? "white" :
                    chessState.players.black === userId ? "black" : null;



            if (!userColor || chessState.turn !== userColor) return;

            const piece = chessState.board[row][col];

            // =========================
            // 👉 PRIMO CLICK (selezione)
            // =========================
            if (!selected) {
                if (piece && isCorrectTurn(piece, chessState.turn)) {
                    selected = { row, col };
                    highlightMoves(row, col, chessState.board);
                }
                return;
            }

            // =========================
            // 👉 CLICK STESSA CASELLA → annulla
            // =========================
            if (selected.row === row && selected.col === col) {
                selected = null;
                clearHighlights();
                return;
            }

            const fromRow = selected.row;
            const fromCol = selected.col;
            const fromPiece = chessState.board[fromRow][fromCol];

            // =========================
            // 👉 CAMBIO SELEZIONE (clicco altro mio pezzo)
            // =========================
            if (piece && isCorrectTurn(piece, chessState.turn)) {
                selected = { row, col };
                highlightMoves(row, col, chessState.board);
                return;
            }

            // =========================
            // 👉 MOSSA (vuota o cattura) + storico
            // =========================
            if (isValidMove(fromRow, fromCol, row, col, chessState.board)) {
                // controllo che non sia suicida
                if (isSuicideMove(fromRow, fromCol, row, col, chessState.board, userColor)) {
                    alert("Mossa non valida: il re verrebbe messo sotto scacco!");
                    return;
                }

                // eseguo la mossa
                chessState.board[row][col] = fromPiece;
                chessState.board[fromRow][fromCol] = "";

                // cambio turno
                chessState.turn = chessState.turn === "white" ? "black" : "white";

                // =========================
                // Aggiorna lo storico
                // =========================
                if (!chessState.history) chessState.history = [];

                const moveText = `${pieceToText(fromPiece)} in ${coordsToNotation(row, col)}`;
                const moveEntry = {
                    fromRow, fromCol,
                    toRow: row, toCol: col,
                    piece: fromPiece,
                    color: userColor,
                    text: moveText,
                    time: Date.now()  // timestamp corrente in millisecondi
                };

                // Inizializza l'array history se non esiste
                if (!chessState.history) chessState.history = [];

                // Aggiungi la mossa
                chessState.history.push(moveEntry);

                // aggiorna ultima mossa se è la stessa (opzionale, utile per editing)
                const lastMove = chessState.history[chessState.history.length - 1];
                if (!lastMove || lastMove.fromRow !== fromRow || lastMove.fromCol !== fromCol || lastMove.toRow !== row || lastMove.toCol !== col) {
                    chessState.history.push(moveEntry);
                } else {
                    chessState.history[chessState.history.length - 1] = moveEntry;
                }

                // reset selezione / evidenziazione
                selected = null;
                clearHighlights();

                await saveChessState(chessState);
                drawBoard(userId, chessState);
                return;
            }

            // =========================
            // 👉 CLICK NON VALIDO → reset
            // =========================
            selected = null;
            clearHighlights();
        }

        // funzione di supporto per notazione tipo "Re in A4"
        function pieceToText(piece) {
            const mapping = {
                K: "Re", Q: "Regina", R: "Torre", N: "Cavallo", B: "Alfiere", P: "Pedone",
                k: "Re", q: "Regina", r: "Torre", n: "Cavallo", b: "Alfiere", p: "Pedone"
            };
            return mapping[piece] || piece;
        }

        // converti coordinate in notazione scacchistica
        function coordsToNotation(r, c) {
            const files = ["A", "B", "C", "D", "E", "F", "G", "H"];
            return files[c] + (8 - r);
        }

        function saveChessState(state) {
            if (state.isNewGame) {
                delete state.isNewGame;
                hideCheckmateOverlay();
            }
            return set(gameRef, state);
        }

        function clearHighlights() {
            document.querySelectorAll(".highlight").forEach(el => el.classList.remove("highlight"));
            document.querySelectorAll(".disabled").forEach(el => el.classList.remove("disabled"));
            document.querySelectorAll(".suicide").forEach(el => el.classList.remove("suicide"));
        }

        function drawBoard(userId, chessState) {

            const currentPlayerEmail = chessState.players[currentTurn] || "Sconosciuto";

            }

            boardElement.innerHTML = "";

            // 🔁 8 righe
            for (let r = 0; r < 8; r++) {

                // ♟️ celle scacchiera
                for (let c = 0; c < 8; c++) {

                    const sq = document.createElement("div");

                    sq.style.width = "10.5%";

                        "square",
                        (r + c) % 2 === 0 ? "white" : "black"
                    );

                    sq.dataset.col = c;

                    if (piece) {
                        sq.innerHTML = `<img src="${pieces[piece]}" class="piece" style="width:80%;height:80%;">`;
                    }

                    sq.addEventListener("click", e => handleClick(e, currentUser.email));

                    row.appendChild(sq);
                }

                // bordo destro
                const rightBorder = document.createElement("div");
                rightBorder.style.width = "8%";
                row.appendChild(rightBorder);

                boardElement.appendChild(row);

                updateHistory(chessState);
                updateChat(chessState);

            }
            console.log(gameId, "neri:", chessState.players.black, currentUser.email)
            if (chessState.players.black == currentUser.email) {
                boardElement.classList.add('rotation');

                for (let piece of document.querySelectorAll('.piece')) {
                    piece.classList.add('rotation');
                }

            } else {
                boardElement.classList.remove('rotation');

                for (let piece of document.querySelectorAll('.piece')) {
                    piece.classList.remove('rotation');
                }

            }
            setTimeout(() => {
                highlightLastMove(chessState);
                highlightCheck(chessState);
            }, 100)
        }

        function highlightCheck(chessState) {
            // rimuovi eventuali check precedenti
            document.querySelectorAll(".square.check").forEach(sq => sq.classList.remove("check"));

            if (!chessState || !chessState.board) return;

            // controlla per entrambi i colori se sono sotto scacco
            const colors = ["white", "black"];
            colors.forEach(color => {
                if (isCheck(chessState.board, color)) {
                    const kingChar = color === "white" ? 'K' : 'k';
                    for (let r = 0; r < 8; r++) {
                        for (let c = 0; c < 8; c++) {
                            if (chessState.board[r][c] === kingChar) {
                                const sq = document.querySelector(`.square[data-row="${r}"][data-col="${c}"]`);
                                if (sq) sq.classList.add("check");
                            }
                        }
                    }
                }
            });
        }

        function highlightLastMove(chessState) {
            // rimuovi highlight precedente
            document.querySelectorAll(".square.last-move, .square.last-move-to").forEach(sq => {
                sq.classList.remove("last-move", "last-move-to");
                sq.style.border = "";
            });

            if (!chessState.history || chessState.history.length === 0) return;

            const lastMove = chessState.history[chessState.history.length - 1];
            const squares = document.querySelectorAll(".square");

            // 🔹 evidenzia partenza e arrivo
            squares.forEach(sq => {
                const r = parseInt(sq.dataset.row);
                const c = parseInt(sq.dataset.col);

                // partenza (solo se vuota)
                if ((r === lastMove.fromRow && c === lastMove.fromCol) && sq.innerHTML.trim() === "") {
                    sq.classList.add("last-move");
                }

                // arrivo
                if (r === lastMove.toRow && c === lastMove.toCol) {
                    sq.classList.add("last-move-to");
                }
            });

            const pieceType = lastMove.piece.toLowerCase();

            // ❌ escludi pedone, cavallo, re
            if (pieceType === "n" || pieceType === "k") return;

            // 🔹 calcola direzione
            const dRow = Math.sign(lastMove.toRow - lastMove.fromRow);
            const dCol = Math.sign(lastMove.toCol - lastMove.fromCol);

            let r = lastMove.fromRow + dRow;
            let c = lastMove.fromCol + dCol;

            const pathSquares = [];

            // 🔹 percorri le caselle intermedie
            while (r !== lastMove.toRow || c !== lastMove.toCol) {
                pathSquares.push({ row: r, col: c });

                const sq = document.querySelector(`.square[data-row="${r}"][data-col="${c}"]`);

                // aggiungi highlight solo se vuota
                if (sq && sq.innerHTML.trim() === "") {
                    sq.classList.add("last-move");
                }

                r += dRow;
                c += dCol;
            }
        }

        // ===== HIGHLIGHT MOVES =====
        async function highlightMoves(row, col, board) {
            const userId = auth.currentUser.uid;
            const chessState = await getChessStateOnce();
            const userColor = chessState.turn;


            document.querySelectorAll(".square").forEach(sq => {
                const r = parseInt(sq.dataset.row), c = parseInt(sq.dataset.col);

                // rimuovi tutte le classi prima
                sq.classList.remove("highlight", "disabled", "suicide");

                if (isValidMove(row, col, r, c, board)) {
                    // controllo se mossa sarebbe suicida
                    if (isSuicideMove(row, col, r, c, board, userColor)) {
                        sq.classList.add("suicide"); // mossa valida ma pericolosa
                    } else {
                        sq.classList.add("highlight"); // mossa valida e sicura
                    }
                } else if (board[r][c] &&
                    ((board[r][c] === board[r][c].toUpperCase() && userColor === "white") ||
                        (board[r][c] === board[r][c].toLowerCase() && userColor === "black"))) {
                    // pezzi miei → non evidenziare
                } else {
                    sq.classList.add("disabled"); // mossa non valida
                }
            });
        }

        // ===== CHECK / CHECKMATE =====
        function isCheck(board, color) {
            // trova il re del colore
            const kingChar = color === "white" ? "K" : "k";
            let kingPos = null;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    if (board[r][c] === kingChar) {
                        kingPos = { row: r, col: c };
                        break;
                    }
                }
                if (kingPos) break;
            }
            if (!kingPos) return false; // errore: re non trovato

            // controlla tutte le mosse dell’avversario
            const opponentColor = color === "white" ? "black" : "white";
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = board[r][c];
                    if (!piece) continue;
                    if (opponentColor === "white" ? piece === piece.toUpperCase() : piece === piece.toLowerCase()) {
                        // verifica se il pezzo può attaccare il re
                        if (isValidMove(r, c, kingPos.row, kingPos.col, board, true)) {
                            return true;
                        }
                    }
                }
            }

            return false;
        }

        /**
         * Controlla se il giocatore color è in scacco matto
         * board: matrice 8x8
         * color: "white" o "black"
         */
        function isCheckmate(board, color) {
            // 1️⃣ Se il re NON è in scacco → non è scacco matto
            if (!isCheck(board, color)) return false;

            const possibleMoves = []; // array per memorizzare le mosse valide

            // 2️⃣ Ciclo su tutti i pezzi del giocatore
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const piece = board[r][c];
                    if (!piece) continue;

                    // solo i pezzi del giocatore
                    if ((color === "white" && piece === piece.toUpperCase()) ||
                        (color === "black" && piece === piece.toLowerCase())) {

                        // prova tutte le possibili mosse su tutta la scacchiera
                        for (let tr = 0; tr < 8; tr++) {
                            for (let tc = 0; tc < 8; tc++) {
                                if (isValidMove(r, c, tr, tc, board)) {
                                    // verifica se la mossa è sicura
                                    if (!isSuicideMove(r, c, tr, tc, board, color)) {
                                        possibleMoves.push({ from: [r, c], to: [tr, tc], piece });
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // stampa le mosse ancora possibili
            if (possibleMoves.length > 0) {
                console.log(`Mosse legali per ${color}:`, possibleMoves);
                return false; // non è scacco matto
            } else {
                console.log(`${color} è in scacco matto!`);
                checkMateColor = color;
                return true; // scacco matto
            }
        }

        // ===== UTILS =====
        /**
 * Controlla se muovere un pezzo da (fromRow, fromCol) a (toRow, toCol)
 * lascerebbe il re del giocatore sotto scacco
 */
        function isSuicideMove(fromRow, fromCol, toRow, toCol, board, playerColor) {
            // 1️⃣ Clona la board per simulare la mossa
            const simulatedBoard = board.map(row => [...row]);

            // Muovi il pezzo
            simulatedBoard[toRow][toCol] = simulatedBoard[fromRow][fromCol];
            simulatedBoard[fromRow][fromCol] = "";

            // 2️⃣ Controlla se il re del playerColor è sotto scacco dopo la mossa
            return isCheck(simulatedBoard, playerColor);
        }
        function isCorrectTurn(piece, turn) { return (turn === "white" && piece === piece.toUpperCase()) || (turn === "black" && piece === piece.toLowerCase()) }
        function isValidMove(sr, sc, dr, dc, board) { const piece = board[sr][sc]; if (!piece) return false; const target = board[dr][dc]; if (target && ((piece === piece.toUpperCase() && target === target.toUpperCase()) || (piece === piece.toLowerCase() && target === target.toLowerCase()))) return false; const dx = dr - sr, dy = dc - sc; switch (piece.toLowerCase()) { case "p": const dir = piece === "P" ? -1 : 1; if (dy === 0 && !target) { if (dx === dir) return true; if ((sr === 6 && piece === "P" || sr === 1 && piece === "p") && dx === 2 * dir && !board[sr + dir][sc]) return true } if (Math.abs(dy) === 1 && dx === dir && target) return true; break; case "r": if (dx === 0 || dy === 0) return clearPath(sr, sc, dr, dc, board); break; case "n": if ((Math.abs(dx) === 2 && Math.abs(dy) === 1) || (Math.abs(dx) === 1 && Math.abs(dy) === 2)) return true; break; case "b": if (Math.abs(dx) === Math.abs(dy)) return clearPath(sr, sc, dr, dc, board); break; case "q": if (dx === 0 || dy === 0 || Math.abs(dx) === Math.abs(dy)) return clearPath(sr, sc, dr, dc, board); break; case "k": if (Math.abs(dx) <= 1 && Math.abs(dy) <= 1) return true }return false }
        function clearPath(sr, sc, dr, dc, board) { const stepX = Math.sign(dr - sr), stepY = Math.sign(dc - sc); let r = sr + stepX, c = sc + stepY; while (r !== dr || c !== dc) { if (board[r][c] !== "") return false; r += stepX; c += stepY } return true }


        function show(elements) {
            for (let element of elements) {
                if (element && element.style) {
                    element.style.display = "block";
                }
            }
        }

        function hide(elements) {
            for (let element of elements) {
                if (element && element.style) {
                    element.style.display = "none";
                }
            }
        }

    </script>
