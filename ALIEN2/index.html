        function parseMultiTileMap(map, cellSize = 80, rowSize = 70) {
            const level = {
                world: 'World 1',
                platforms: [],
                ladders: [],
                spikes: [],
                trapdoors: [],
                buttons: [],
                doors: [],
                lever: [],
                npcs: [],
                specialDoors: []
            };

            for (let i = 0; i < map.length; i++) {

                const row = map[i];
                const parsed = parseTypedPlatformRuns(row, cellSize);

                // =========================
                // PLATFORMS
                // =========================
                for (let plat of parsed.platforms) {
                    level.platforms.push({
                        ...plat,
                        y: i * rowSize
                    });
                }

                const platformBaseIndex =
                    level.platforms.length - parsed.platforms.length;

                // =========================
                // DOORS
                // =========================
                for (let door of parsed.doors) {
                    level.doors.push({
                        ...door,
                        platformIndex: platformBaseIndex 
                    });
                }

                // =========================
                // LADDERS
                // =========================
                for (let ladder of parsed.ladders) {
                    level.ladders.push({
                        ...ladder,
                        platformIndex: platformBaseIndex 
                    });
                }

                // =========================
                // SPIKES
                // =========================
                for (let spike of parsed.spikes) {
                    level.spikes.push({
                        ...spike,
                        platformIndex: platformBaseIndex 
                    });
                }

                // =========================
                // LEVERS
                // =========================
                for (let lever of parsed.levers) {
                    level.lever.push({
                        ...lever,
                        platformIndex: platformBaseIndex 
                    });
                }

                // =========================
                // BUTTONS
                // =========================
                for (let button of parsed.buttons) {
                    level.buttons.push({
                        ...button,
                        platformIndex: platformBaseIndex 
                    });
                }
                // =========================
                // TRAPDOORS
                // =========================
                for (let trap of parsed.trapdoors) {
                    level.trapdoors.push({
                        ...trap,
                        platformIndex: platformBaseIndex 
                    });
                }

                // =========================
                // NPCS
                // =========================
                for (let npc of parsed.npcs) {
                    level.npcs.push({
                        ...npc,
                        y: i * rowSize
                    });
                }

                // =========================
                // SPECIAL DOORS
                // =========================
                for (let special of parsed.specialDoors) {
                    console.log(special)
                    level.specialDoors.push({
                        ...special,
                        platformIndex: platformBaseIndex 
                    });
                }

            }
            console.log(level)
            return level;
        }

        function parseTypedPlatformRuns(row, cellSize = 80) {

            const platforms = [];
            const doors = [];
            const ladders = [];
            const spikes = [];
            const levers = [];
            const buttons = [];
            const trapdoors = [];
            const npcs = [];
            const specialDoors = [];

            let runStart = null;
            let runType = null;

            const isPlatformChar = (c) => c === "_" || c === "=";

            const isObjectChar = (c) =>
                c === "D" ||
                c === "L" ||
                c === "s" ||
                c === "l" ||
                c === "h" ||
                c === "b" ||
                c === "w" ||
                c === "t" ||
                c === "c" ||
                c === "f" ||
                c === "d" ||
                c === "N" ||
                c === "X";

            for (let x = 0; x <= row.length; x++) {

                const char = row[x] || "-";

                // =========================
                // PLATFORM
                // =========================
                if (isPlatformChar(char)) {

                    if (runStart === null) {
                        runStart = x;
                        runType = (char === "=") ? "solid" : "normal";
                    }

                    continue;
                }

                // =========================
                // OBJECTS (NO BREAK RUN)
                // =========================
                if (isObjectChar(char)) {
                    if (char === "X") {

                        specialDoors.push({
                            x: x * cellSize,
                            width: 50,
                            height: 90,
                            open: false,
                            id: "auto" 
                        });

                        continue;
                    }
                    if (char === "N") {

                        npcs.push({
                            x: x * cellSize,
                            y: 0, // la y la assegni dopo nel loop principale
                            width: 50,
                            height: 50,
                            dx: 2,
                            speed: 2,
                            onGround: true,
                            facingRight: true,
                            state: "walk",
                            frameIndex: 0,
                            frameCounter: 0,
                            sayHelloTimer: 0,
                            following: false,
                            isUnderPlatform: false,
                            isRolling: false,
                            onLadder: false,
                            inLadderZone: false,
                            followOffsetX: (Math.random() * 60) - 30
                        });

                        continue;
                    }
                    if (char === "t") {
                        trapdoors.push({
                            x: x * cellSize,
                            width: 60,
                            height: 20,
                            open: false,
                            angle: 0,
                            targetAngle: 0,
                            mode: "normal"
                        });
                    }

                    if (char === "f") {
                        trapdoors.push({
                            x: x * cellSize,
                            width: 60,
                            height: 20,
                            open: false,
                            angle: 0,
                            targetAngle: 0,
                            mode: "flipped"
                        });
                    }

                    if (char === "d") {
                        trapdoors.push({
                            x: x * cellSize,
                            width: 60,
                            height: 20,
                            open: false,
                            angle: 0,
                            targetAngle: 0,
                            mode: "double"
                        });
                    }
                    if (char === "b") {
                        buttons.push({
                            x: x * cellSize,
                            width: 20,
                            height: 20,
                            pressed: false,
                            mode: "ON",
                            state: 0,
                            targets: []
                        });
                    }

                    if (char === "w") {
                        buttons.push({
                            x: x * cellSize,
                            width: 20,
                            height: 20,
                            pressed: false,
                            mode: "TOGGLE",
                            state: 0,
                            targets: []
                        });
                    }

                    if (char === "c") {
                        buttons.push({
                            x: x * cellSize,
                            width: 20,
                            height: 20,
                            pressed: false,
                            mode: "TRICOLOR",
                            state: 0,
                            targets: []
                        });
                    }

                    if (char === "D") {
                        doors.push({
                            x: x * cellSize,
                            width: 50,
                            height: 80,
                            open: false,
                            id: "auto"
                        });
                    }

                    if (char === "L") {
                        ladders.push({
                            x: x * cellSize,
                            width: 20,
                            height: 60
                        });
                    }

                    if (char === "s") {
                        spikes.push({
                            x: x * cellSize,
                            width: 40,
                            height: 20,
                            active: true
                        });
                    }

                    if (char === "l") {
                        levers.push({
                            x: x * cellSize,
                            width: 50,
                            height: 20,
                            angle: -45,
                            mode: "TOGGLE"
                        });
                    }

                    if (char === "h") {
                        levers.push({
                            x: x * cellSize,
                            width: 50,
                            height: 20,
                            angle: -45,
                            mode: "HOLD"
                        });
                    }

                    continue;
                }

                // =========================
                // END RUN
                // =========================
                if (runStart !== null) {

                    platforms.push({
                        x: runStart * cellSize,
                        width: (x - runStart) * cellSize,
                        height: 20,
                        type: runType
                    });

                    runStart = null;
                    runType = null;
                }
            }

            // flush finale
            if (runStart !== null) {
                platforms.push({
                    x: runStart * cellSize,
                    width: (row.length - runStart) * cellSize,
                    height: 20,
                    type: runType
                });
            }

            return {
                platforms,
                doors,
                ladders,
                spikes,
                levers,
                buttons,
                trapdoors,
                npcs,
                specialDoors
            };
        }

        function isNear(obj, xTolerance = 50, yTolerance = 40) {
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            const objCenterX = obj.x + obj.width / 2;
            const objCenterY = obj.y + obj.height / 2;

            const dx = Math.abs(playerCenterX - objCenterX);
            const dy = Math.abs(playerCenterY - objCenterY);

            return dx <= xTolerance && dy <= yTolerance;
        }
        // =========================

        function isNear(obj) {
            const distanceX = Math.abs((player.x + player.width / 2) - (obj.x + obj.width / 2));
            const distanceY = Math.abs((player.y + player.height) - (obj.y + obj.height)); // base oggetto
            return distanceX < 50 && distanceY < 20; // puoi regolare soglia

        function handleNPCTrapdoorCollisions(npc, platforms, trapdoors) {
            if (!npc || !platforms) return -1;

            let ignorePlatIndex = -1;

            function isOnTrapdoorArea(platformIndex, npc) {
                if (!trapdoors) return false;

                for (let trap of trapdoors) {

                    if (trap.platformIndex !== platformIndex) continue;

                    const paddingX = 20;

                    function check(x, width) {
                        return (
                            npc.x + npc.width > x + paddingX &&
                            npc.x < x + width - paddingX
                        );
                    }

                    // normal / flipped
                    if (!trap.mode || trap.mode === "normal" || trap.mode === "flipped") {
                        if (check(trap.x, trap.width)) return true;
                    }

                    // double
                    if (trap.mode === "double") {
                        const spacing = trap.width;

                        if (
                            check(trap.x, trap.width) ||
                            check(trap.x + spacing, trap.width)
                        ) {
                            return true;
                        }
                    }
                }

                return false;
            }

            for (let trap of trapdoors) {

                const platform = platforms[trap.platformIndex];
                if (!platform) continue;

                const npcBottom = npc.y + npc.height;
                const npcTop = npc.y;
                const npcRight = npc.x + npc.width;
                const npcLeft = npc.x;

                const trapY = platform.y;
                const trapHeight = trap.height || platform.height;

                const paddingX = 20;

                const trapLeft = trap.x + paddingX;
                const trapRight = trap.x + trap.width - paddingX;

                const inside =
                    npcBottom > trapY &&
                    npcTop < trapY + trapHeight &&
                    npcRight > trapLeft &&
                    npcLeft < trapRight;

                if (inside && trap.open) {
                    ignorePlatIndex = trap.platformIndex;
                }
            }

            return ignorePlatIndex;
        }
        function handleNPCPlatformCollisions(npc, platforms, trapdoors) {
            if (!npc || !platforms) return;

            function isOnTrapdoorArea(platformIndex, npc) {
                if (!trapdoors) return false;

                for (let trap of trapdoors) {

                    if (trap.platformIndex !== platformIndex) continue;

                    const paddingX = 20;

                    function check(x, width) {
                        return (
                            npc.x + npc.width > x + paddingX &&
                            npc.x < x + width - paddingX
                        );
                    }

                    // normal / flipped
                    if (!trap.mode || trap.mode === "normal" || trap.mode === "flipped") {
                        if (check(trap.x, trap.width)) return true;
                    }

                    // double
                    if (trap.mode === "double") {
                        const spacing = trap.width;

                        if (
                            check(trap.x, trap.width) ||
                            check(trap.x + spacing, trap.width)
                        ) {
                            return true;
                        }
                    }
                }

                return false;
            }

            for (let plat of platforms) {

                if (isOnTrapdoorArea(platforms.indexOf(plat), npc)) continue;

                // =========================
                // VERTICALE
                // =========================
                if (
                    npc.x + npc.width > plat.x &&
                    npc.x < plat.x + plat.width &&
                    npc.y + npc.height > plat.y &&
                    npc.y + npc.height < plat.y + plat.height &&
                    npc.dy >= 0
                ) {
                    npc.y = plat.y - npc.height;
                    npc.dy = 0;
                    npc.onGround = true;
                }

                // =========================
                // ORIZZONTALE
                // =========================
                if (
                    npc.y + npc.height > plat.y &&
                    npc.y < plat.y + plat.height
                ) {
                    if (npc.isCrouching) {

                        npc.isUnderPlatform = true;

                        if (
                            (npc.dx > 0 && npc.x > plat.x + plat.width - 20) ||
                            (npc.dx < 0 && npc.x < plat.x - 20)
                        ) {
                            npc.isUnderPlatform = false;
                            npc.isCrouching = false;
                            continue;
                        }

                    } else {

                        if (
                            npc.dx > 0 &&
                            npc.x + npc.width > plat.x &&
                            npc.x < plat.x
                        ) {
                            npc.x = plat.x - npc.width;
                            npc.dx = 0;
                        }

                        if (
                            npc.dx < 0 &&
                            npc.x < plat.x + plat.width &&
                            npc.x + npc.width > plat.x + plat.width
                        ) {
                            npc.x = plat.x + plat.width;
                            npc.dx = 0;
                        }
                    }
                }
            }
        }

        function handleEntityPlatformCollisions(entity, platforms, trapdoors) {
            if (!entity || !platforms) return;

            entity.onGround = false;

            // =========================
            // TRAPDOOR CHECK
            // =========================
            function isOnTrapdoorArea(platformIndex, ent) {
                if (!trapdoors) return false;

                for (let trap of trapdoors) {

                    if (trap.platformIndex !== platformIndex) continue;

                    const paddingX = 20;

                    function check(x, width) {
                        return (
                            ent.x + ent.width > x + paddingX &&
                            ent.x < x + width - paddingX
                        );
                    }

                    // normal / flipped
                    if (!trap.mode || trap.mode === "normal" || trap.mode === "flipped") {
                        if (check(trap.x, trap.width)) return true;
                    }

                    // double
                    if (trap.mode === "double") {
                        const spacing = trap.width;

                        if (
                            check(trap.x, trap.width) ||
                            check(trap.x + spacing, trap.width)
                        ) {
                            return true;
                        }
                    }
                }

                return false;
            }
            platforms.forEach((plat, i) => {

                // =========================
                // VERTICAL COLLISION
                // =========================

                let blockedByOpenTrapdoor = false;

                if (trapdoors) {
                    for (let trap of trapdoors) {

                        if (trap.platformIndex !== i) continue;

                        const paddingX = 20;

                        const insideX =
                            entity.x + entity.width > trap.x + paddingX &&
                            entity.x < trap.x + trap.width - paddingX;

                        if (insideX && trap.open) {
                            blockedByOpenTrapdoor = true;
                        }
                    }
                }

                // 👉 SOLO se APERTA la trapdoor blocca la piattaforma
                if (
                    !blockedByOpenTrapdoor &&
                    !entity.onLadder &&
                    entity.x + entity.width > plat.x &&
                    entity.x < plat.x + plat.width &&
                    entity.y + entity.height > plat.y &&
                    entity.y + entity.height < plat.y + plat.height &&
                    entity.dy >= 0
                ) {
                    entity.y = plat.y - entity.height;
                    entity.dy = 0;
                    entity.onGround = true;
                }

                // =========================
                // HORIZONTAL COLLISION (UGUALE)
                // =========================
                if (
                    entity.y + entity.height > plat.y &&
                    entity.y < plat.y + plat.height
                ) {
                    if (entity.isCrouching) {

                        entity.isUnderPlatform = true;

                        if (
                            (entity.dx > 0 && entity.x > plat.x + plat.width - 20) ||
                            (entity.dx < 0 && entity.x < plat.x - 20)
                        ) {
                            entity.isUnderPlatform = false;
                            entity.isCrouching = false;
                            return;
                        }

                    } else {

                        if (
                            entity.dx > 0 &&
                            entity.x + entity.width > plat.x &&
                            entity.x < plat.x
                        ) {
                            entity.x = plat.x - entity.width;
                            entity.dx = 0;
                        }

                        if (
                            entity.dx < 0 &&
                            entity.x < plat.x + plat.width &&
                            entity.x + entity.width > plat.x + plat.width
                        ) {
                            entity.x = plat.x + plat.width;
                            entity.dx = 0;
                        }
                    }
                }
            });
        }


        function applyNPCGravity(npc, gravity, floorY) {
            if (!npc) return;
            if (npc.onLadder) {
                npc.dy = 0;
                return;
            }
            npc.dy = npc.dy || 0;

            // Gravità se non su piattaforma
            if (!npc.onGround) {
                npc.dy += gravity;
                npc.y += npc.dy;

                // Limite inferiore del canvas o piattaforma
                if (npc.y >= floorY) {
                    npc.y = floorY;
                    npc.dy = 0;
                    npc.onGround = true;
                }
            }
        }
        function constrainNPCToCanvas(npc, canvas) {
            npc.x = Math.max(0, Math.min(npc.x, canvas.width - npc.width));
            npc.y = Math.max(0, Math.min(npc.y, canvas.height - npc.height));
        }
        function handleNPCCollisionWithDoors(npc, doors, platforms) {
            if (!npc || !doors || !platforms) return;

            let nextX = npc.x + (npc.dx || 0);

            for (let door of doors) {
                if (!door.open) { // usa 'open' come nel player
                    const platform = platforms[door.platformIndex];
                    if (!platform) continue;

                    // Calcola posizione reale porta sulla piattaforma
                    const doorX = door.x;
                    const doorY = platform.y - door.height;

                    const doorLeft = doorX;
                    const doorRight = doorX + door.width;
                    const doorTop = doorY;
                    const doorBottom = doorY + door.height;

                    const npcLeft = nextX;
                    const npcRight = nextX + npc.width;
                    const npcTop = npc.y;
                    const npcBottom = npc.y + npc.height;

                    const overlap =
                        npcRight > doorLeft &&
                        npcLeft < doorRight &&
                        npcBottom > doorTop &&
                        npcTop < doorBottom;

                    if (overlap) {
                        if ((npc.dx || 0) > 0) nextX = doorLeft - npc.width;
                        else if ((npc.dx || 0) < 0) nextX = doorRight;
                        npc.dx = 0;
                    }
                }
            }

            npc.x = nextX;
        }
        // =========================
        // --- Aggiornamento animazione NPC ---
        // =========================
        function updateNPCAnimation(npc) {
            if (!npc) return;

            // Incrementa contatore frame
            npc.frameCounter = (npc.frameCounter || 0) + 1;

            if (npc.frameCounter < 5) return;

            // Aggiorna frame in base allo stato
            if (npc.state === 'climb') {
                npc.frameIndex = npc.facingRight
                    ? (npc.frameIndex + 1) % npcClimbRight.length
                    : (npc.frameIndex + 1) % npcClimbLeft.length;
            } else if (npc.state === 'walk') {
                npc.frameIndex = npc.facingRight
                    ? (npc.frameIndex + 1) % npcFramesRight.length
                    : (npc.frameIndex + 1) % npcFramesLeft.length;
            } else if (npc.state === 'roll') {
                npc.frameIndex = npc.facingRight
                    ? (npc.frameIndex + 1) % npcRollRight.length
                    : (npc.frameIndex + 1) % npcRollLeft.length;
            } else {
                npc.frameIndex = 0; // stato idle
            }

            // Resetta contatore
            npc.frameCounter = 0;
        }
        // =========================
        // --- Movimento NPC verso il player ---
        // =========================
        function handleNPCMovement(npc, player, speed) {
            if (!npc) {
                return
            }
            const climbSpeed = npc.speed || 2;
            const dy = player.y - npc.y;
            if (npc.onLadder) {
                //console.log("npc on ladder", npc.x, npc.y, npc.ladderX, npc.ladderY)
                npc.state = 'climb';
                npc.isCrouching = false;
                npc.isUnderPlatform = false;
                npc.following = false;
                npc.dy = dy > 0 ? climbSpeed : -climbSpeed;

                // Applica movimento
                npc.y -= 5;

                return;
            }

            npc.onGround = false;


            if (npc.following) {
                if (player.isCrouching || npc.isUnderPlatform) {
                    npc.state = 'roll';
                    npc.isCrouching = true;
                    npc.dx = player.x > npc.x ? speed : -speed;
                    npc.facingRight = npc.dx > 0;
                } else {
                    npc.isCrouching = false;
                    const targetX = player.x + (npc.followOffsetX || 0);
                    const dx = targetX - npc.x;

                    if (Math.abs(dx) > 5) {
                        npc.dx = dx > 0 ? speed : -speed;
                        npc.facingRight = npc.dx > 0;
                        npc.state = 'walk';
                    } else {
                        npc.dx = 0;
                        npc.state = 'idle';
                    }
                }

        function handleNPCLadder(npc, ladders, player) {
            if (!ladders || npc.dead) return;

            // 🔒 Se è già su una scala, controlla SOLO quella
            if (npc.onLadder && npc.currentLadder) {

                const ladder = npc.currentLadder;

                const stillOnLadder =
                    npc.x > (ladder.x - 40) &&
                    npc.x < (ladder.x - 10);

                if (!stillOnLadder) {
                    npc.onLadder = false;
                    npc.currentLadder = null;
                }
                return;
            } else {
                // 🔍 Cerca nuova scala
                for (let ladder of ladders) {
                    if (
                        npc.x > (ladder.x - 40) &&
                        npc.x < (ladder.x - 10) &&
                        npc.y == getCurrentLevel().platforms[ladder.platformIndex].y + 10
                    ) {
                        npc.onLadder = true;
                        npc.currentLadder = ladder; // 🔥 fondamentale
                        npc.ladderX = ladder.x;
                        npc.ladderY = getCurrentLevel().platforms[ladder.platformIndex].y;
                        break;
                    }
                }
            }

            const nearbyIndexes = [];
            const npcs = level.npcs || [];
            for (let i = 0; i < npcs.length; i++) {
                const npc = npcs[i];
                const dx = (player.x + player.width / 2) - (npc.x + npc.width / 2);
                const dy = (player.y + player.height / 2) - (npc.y + npc.height / 2);
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance <= maxDistance) {
                    nearbyIndexes.push(i);
                }
            }
            console.log(nearbyIndexes);

            return nearbyIndexes;

            // Rimuovi dal vecchio livello
            npcIndexes
                .sort((a, b) => b - a)
                .forEach(i => oldLevel.npcs.splice(i, 1));

            // Aggiungi al nuovo livello

                const offsetX = enterFromRight
                    ? -(npc.width + 5)
                    : (player.width + 5);

                    x: player.x + offsetX,
                    y: player.y + offsetY,
                    dx: 0,

            }

        function drawTrapdoor(trap) {
            const platforms = getCurrentPlatforms();
            const platform = platforms[trap.platformIndex];
            if (!platform) return;

            const trapY = platform.y;

            // 🎯 helper per disegnare UNA trapdoor
            function drawSingleTrap(x, angle, flipped = false) {

                ctx.save();

                if (flipped) {
                    // pivot a destra
                    ctx.translate(x + trap.width, trapY);
                    ctx.rotate(-angle * Math.PI / 180);
                } else {
                    // pivot a sinistra
                    ctx.translate(x, trapY);
                    ctx.rotate(angle * Math.PI / 180);
                }

                const size = 20;
                const repetitionsX = Math.ceil(trap.width / size);
                const repetitionsY = Math.ceil(trap.height / size);

                const offsetX = flipped ? -trap.width : 0;

                if (trapdoorImg && trapdoorImg.complete) {
                    for (let i = 0; i < repetitionsY; i++) {
                        for (let j = 0; j < repetitionsX; j++) {
                            ctx.drawImage(
                                trapdoorImg,
                                offsetX + j * size,
                                i * size,
                                size,
                                size
                            );
                        }
                    }
                } else {
                    ctx.fillStyle = trap.open ? "#654321" : "#8B4513";
                    ctx.fillRect(
                        offsetX,
                        0,
                        trap.width,
                        trap.height
                    );
                }

                ctx.restore();
            }

            // =========================
            // --- MODES ---
            // =========================

            // 🔹 default
            if (!trap.mode || trap.mode === "normal") {
                drawSingleTrap(trap.x, trap.angle, false);
            }

            // 🔹 flipped
            else if (trap.mode === "flipped") {
                drawSingleTrap(trap.x, trap.angle, true);
            }

            // 🔹 double
            else if (trap.mode === "double") {
                const spacing = trap.width; // oppure 60 se vuoi fisso

                // sinistra (normale)
                drawSingleTrap(trap.x, trap.angle, false);

                // destra (flipped)
                drawSingleTrap(trap.x + spacing, trap.angle, true);
            }
        }

        function findPlatformByHeight(y) {

                const playerBottom = player.y + player.height;

                const inLadderX = (player.x + player.width) > ladder.x && player.x < (ladder.x + ladder.width);
                const onPlatform = playerBottom >= platform.y - 1 && playerBottom <= platform.y + 5;

                if (onPlatform && inLadderX) {
                    player.inLadderZone = true;
                    if (keys.down) {
                        player.y += 1;
                        player.onLadder = true;
                    }
                }

                if (playerBottom > ladderTop && playerTop < ladderBottom && inLadderX) {
                    player.onLadder = true;
                    player.dy = 0;
                    if (keys.up) {
                        player.y -= player.speed;
                        if (player.y < platforms[ladder.platformIndex].y - 45) {
                            player.onLadder = false;
                        }
                    }
                    if (keys.down) player.y += player.speed;
                    break;
                }
            }
        }

        function handleSayHello(player, level) {
            if (level.npcs) {
                level.npcs.forEach(npc => {
                    if (player.y > (npc.y - 10) && player.y < (npc.y + 10)
                        && player.x > (npc.x - 70) && player.x < (npc.x + 70)
                    ) {
                        npc.following = true
                    }
                });
            }

            if (sayHelloTimer > 0) {
                imgToDraw = facingRight ? sayHelloFramesRight[0] : sayHelloFramesLeft[0];
                sayHelloTimer--;
                if (sayHelloTimer <= 0) currentFrame = 0;
            }
        }
        function handleDoorCollision(player, platforms, doors) {
            let nextX = player.x + player.dx;

            if (!doors) return nextX;

            for (let door of doors) {
                if (door.open) continue;

                const platform = platforms[door.platformIndex];
                if (!platform) continue;

                const doorLeft = door.x;
                const doorRight = door.x + door.width;
                const doorTop = platform.y - door.height;
                const doorBottom = doorTop + door.height;

                const playerLeft = nextX;
                const playerRight = nextX + player.width;
                const playerTop = player.y;
                const playerBottom = player.y + player.height;

                const overlap =
                    playerRight > doorLeft &&
                    playerLeft < doorRight &&
                    playerBottom > doorTop &&
                    playerTop < doorBottom;

                if (overlap) {
                    if (player.dx > 0) {
                        nextX = doorLeft - player.width;
                    } else if (player.dx < 0) {
                        nextX = doorRight;
                    }
                    player.dx = 0;
                }
            }

            return nextX;
        }
        function applyGravity(player, gravity, jumpPressed) {
            if (player.onLadder) return;

            // Aggiorna velocità verticale e posizione
            player.dy += gravity;
            player.y += player.dy;

            // Salto
            if (jumpPressed && player.onGround && !player.isCrouching) {
                player.dy = -player.jumpForce;
                resetSounds();
                soundPlay('jump');
            }
        }
        function updatePlayerAnimationAndSounds(player, keys, isMoving, facingRight) {
            // --- Animazione rotolata / camminata / fermo ---
            if (player.isCrouching && isMoving) {
                // rotolata
                rollFrameCounter++;
                if (rollFrameCounter >= 5) {
                    rollFrameIndex = (rollFrameIndex + 1) % rollFramesRight.length;
                    rollFrameCounter = 0;
                }
            } else if (isMoving) {
                // camminata
                advanceFrame();
            } else {
                // fermo
                currentFrame = 0;
            }

            // --- Animazione scala ---
            if (player.onLadder) {
                if (keys.up || keys.down) {
                    climbFrameCounter++;
                    if (climbFrameCounter >= 5) {
                        climbFrameIndex = (climbFrameIndex + 1) % climbFramesRight.length;
                        climbFrameCounter = 0;
                    }
                } else {
                    climbFrameIndex = 0; // fermo sulla scala
                }

                return facingRight
                    ? climbFramesRight[climbFrameIndex]
                    : climbFramesLeft[climbFrameIndex];
            }

            // --- Rialzarsi dall'accovacciata ---
            if (keys.up && player.isCrouching) {
                player.isCrouching = false;
            }

            // --- Suoni ---
            if (player.isCrouching || player.onLadder) {
                resetSounds();
                soundPlay('ladder');
            } else if (isPushingButton) {
                resetSounds();
                soundPlay('button');
            } else if (isPullingLever) {
                resetSounds();
                soundPlay('lever');
            }

            // Ritorna frame da disegnare
            if (player.isCrouching && isMoving) {
                return facingRight
                    ? rollFramesRight[rollFrameIndex]
                    : rollFramesLeft[rollFrameIndex];
            } else if (isMoving) {
                return facingRight
                    ? framesRight[currentFrame]
                    : framesLeft[currentFrame];
            } else {
                return facingRight
                    ? framesRight[0]
                    : framesLeft[0];
            }
        }
        // =========================
        // --- Gestione interazioni leve / pulsanti ---
        // =========================
        function handleInteractions(player, keys, platforms, level) {
            if (player.onLadder || !keys.interact) return;

            // --- Leva ---
            if (!isPullingLever && level.lever[0]) {
                const lever = level.lever[0];
                const platform = platforms[lever.platformIndex];
                const dx = Math.abs((player.x + player.width / 2) - (lever.x + lever.width / 2));
                const dy = Math.abs((player.y + player.height) - platform.y);

                if (dx < 50 && dy < 20) {
                    isPullingLever = true;
                    leverFrame = 0;
                    leverCounter = 0;
                    activeLever = lever;
                    activeLever.angle = lever.angle;

                    let targetAngle = -activeLever.angle;
                    if (lever.mode === "TOGGLE") activeLever.returnDelay = 100;
                    activeLever._currentTarget = targetAngle;

                    const leverCenterX = (lever.x - 15) + lever.width / 2;
                    const offsetX = 20;

                    if (activeLever.angle < 0) {
                        player.x = leverCenterX + offsetX;
                        facingRight = false;
                    } else {
                        player.x = leverCenterX - player.width - offsetX;
                        facingRight = true;
                    }

                    player.y = platform.y - player.height;
                    keys.interact = false;
                    console.log("Lever triggered:", activeLever);
                    return;
                }
            }

            // --- Pulsanti ---
            if (!isPushingButton && level.buttons) {
                for (let button of level.buttons) {
                    const platform = platforms[button.platformIndex];
                    const dx = Math.abs((player.x + player.width / 2) - (button.x + button.width / 2));
                    const dy = Math.abs((player.y + player.height) - platform.y);

                    if (dx < 50 && dy < 60) {
                        isPushingButton = true;
                        pushButtonFrameIndex = 0;
                        pushButtonFrameCounter = 0;
                        activeButton = button;

                        player.x = facingRight
                            ? button.x - player.width + 10
                            : button.x + button.width - 10;
                        player.dx = 0;

                        keys.interact = false;
                        console.log("Button triggered:", activeButton);
                        return;
                    }
                }
            }
        }

        // =========================
        // --- Aggiornamento animazioni leve / pulsanti ---
        // =========================
        function updateInteractionAnimations() {
            // --- Animazione leva ---
            if (isPullingLever && activeLever) {
                leverCounter++;
                if (leverCounter >= 5) { leverFrame++; leverCounter = 0; }

                let progress = Math.min(leverFrame / pullLeverRight.length, 1);
                activeLever.angle += (activeLever._currentTarget - activeLever.angle) * progress;

                if (leverFrame >= pullLeverRight.length) {
                    isPullingLever = false;
                    leverFrame = 0;

                    if (activeLever.mode === "TOGGLE") {
                        const lever = activeLever;
                        const startAngle = lever.angle;
                        const leverTargets = lever.targets;

                        setTimeout(() => {
                            lever.angle = -startAngle;
                            if (leverTargets) toggleTrapdoors(leverTargets);
                            console.log("TOGGLE lever returned:", lever);
                        }, lever.returnDelay || 500);
                    } else if (activeLever.mode === "HOLD") {
                        activeLever.angle = activeLever._currentTarget;
                        if (activeLever.targets) toggleTrapdoors(activeLever.targets);
                        console.log("HOLD lever finished:", activeLever);
                        activeLever = null;
                    }
                }
            }

            // --- Animazione pulsante ---
            if (isPushingButton && activeButton) {
                pushButtonFrameCounter++;
                if (pushButtonFrameCounter >= 5) {
                    pushButtonFrameIndex++;
                    pushButtonFrameCounter = 0;

                    if (pushButtonFrameIndex >= pushButtonFramesRight.length) {
                        isPushingButton = false;
                        pushButtonFrameIndex = 0;

                        if (activeButton) {
                            applyButtonEffect(activeButton);
                            activeButton = null;
                        }
                    }
                }
            }
        }
        function handlePlatformCollisions(player, platforms, trapdoors) {

            player.onGround = false;

            // =========================
            // --- TRAPDOOR CHECK ---
            // =========================
            function isOnTrapdoorArea(platformIndex, player) {
                if (!trapdoors) return false;

                for (let trap of trapdoors) {

                    if (trap.platformIndex !== platformIndex) continue;

                    const paddingX = 20;

                    function check(x, width) {
                        return (
                            player.x + player.width > x + paddingX &&
                            player.x < x + width - paddingX
                        );
                    }

                    // normal / flipped
                    if (!trap.mode || trap.mode === "normal" || trap.mode === "flipped") {
                        if (check(trap.x, trap.width)) return true;
                    }

                    // double
                    if (trap.mode === "double") {
                        const spacing = trap.width;

                        if (
                            check(trap.x, trap.width) ||
                            check(trap.x + spacing, trap.width)
                        ) {
                            return true;
                        }
                    }
                }

                return false;
            }

            // =========================
            // --- PLATFORM LOOP ---
            // =========================
            platforms.forEach((plat, i) => {

                // 🔥 piattaforma ignorata se trapdoor sopra
                if (isOnTrapdoorArea(i, player)) return;

                // =========================
                // --- COLLISIONE VERTICALE ---
                // =========================
                if (
                    !player.onLadder &&
                    player.x + player.width > plat.x &&
                    player.x < plat.x + plat.width &&
                    player.y + player.height > plat.y &&
                    player.y + player.height < plat.y + plat.height &&
                    player.dy >= 0
                ) {
                    player.y = plat.y - player.height;
                    player.dy = 0;
                    player.onGround = true;
                }

                // =========================
                // --- COLLISIONE ORIZZONTALE ---
                // =========================
                if (
                    player.y + player.height > plat.y &&
                    player.y < plat.y + plat.height
                ) {
                    if (player.isCrouching) {

                        player.isUnderPlatform = true;

                        if (
                            (player.dx > 0 && player.x > plat.x + plat.width - 20) ||
                            (player.dx < 0 && player.x < plat.x - 10)
                        ) {
                            player.isUnderPlatform = false;
                            player.isCrouching = false;
                            return;
                        }

                    } else {

                        if (
                            player.dx > 0 &&
                            player.x + player.width > plat.x &&
                            player.x < plat.x
                        ) {
                            player.x = plat.x - player.width;
                        }

                        if (
                            player.dx < 0 &&
                            player.x < plat.x + plat.width &&
                            player.x + player.width > plat.x + plat.width
                        ) {
                            player.x = plat.x + plat.width;
                        }
                    }
                }
            });
        }
        // =========================
        // --- Collisioni trapdoors / botole ---
        // =========================
        function handleTrapdoorCollisions(player, platforms, trapdoors) {
            if (!trapdoors) return;

            trapdoors.forEach(trap => {
                const platform = platforms[trap.platformIndex];
                if (!platform) return;

                const playerBottom = player.y + player.height;
                const trapY = platform.y;

                const paddingX = 10;

                function isInside(x, width) {
                    return (
                        player.x + player.width > x + paddingX &&
                        player.x < x + width - paddingX
                    );
                }

                let inside = false;

                // normal / flipped
                if (!trap.mode || trap.mode === "normal" || trap.mode === "flipped") {
                    inside = isInside(trap.x, trap.width);
                }

                // double
                else if (trap.mode === "double") {
                    const spacing = trap.width;

                    inside =
                        isInside(trap.x, trap.width) ||
                        isInside(trap.x + spacing, trap.width);
                }

                // 🎯 SUPPORTO SOLO SE CHIUSA
                if (inside && !trap.open) {
                    if (
                        playerBottom >= trapY - 5 &&
                        playerBottom <= trapY + 10
                    ) {
                        player.y = trapY - player.height;
                        player.dy = 0;
                        player.onGround = true;
                    }
                }

                // animazione
                trap.angle += (trap.targetAngle - trap.angle) * 0.2;
            });
        }
        // =========================
        // --- Collisioni spike ---
        // =========================
        function handleSpikeCollisions(entity, platforms, spikes) {
            if (!spikes) return;

            spikes.forEach(spike => {
                if (!spike.active) return;
                const platform = platforms[spike.platformIndex];
                if (!platform) return;

                const platformY = platform.y;
                const spikeTop = platformY - spike.height;
                const spikeBottom = platformY;

                const entityBottom = entity.y + entity.height;
                const entityTop = entity.y;

                const verticalCollision = entityBottom > spikeTop && entityTop < spikeBottom;
                const horizontalCollision = entity.x + entity.width > spike.x && entity.x < spike.x + spike.width;

                if (verticalCollision && horizontalCollision) {
                    deathOfPlayer();
                    deathOfNPC(levels[0].npcs[0])
                }
            });
        }
        // =========================
        // --- Gestione porte e trigger ---
        // =========================
        function handleTriggers(level) {
            let activeTriggers = [];

            // --- Leve ---
            if (level.lever && level.lever[0] && level.lever[0].active && level.lever[0].targets) {
                for (let id of level.lever[0].targets) {
                    if (!activeTriggers.includes(id)) activeTriggers.push(id);
                }
            }

            // --- Pulsanti ---
            if (level.buttons) {
                level.buttons.forEach(b => {
                    if (!b.targets) return;

                    if (b.mode === "TRICOLOR") {
                        // TRICOLOR → attivo se NON è grigio (state 0)
                        if (b.state !== 0) {
                            activeTriggers.push(...b.targets);
                        }
                    } else {
                        // comportamento normale
                        if (b.pressed) {
                            activeTriggers.push(...b.targets);
                        }
                    }
                });
            }

            // --- Trapdoors ---
            if (level.trapdoors) {
                level.trapdoors.forEach(t => {
                    if (t.open || !activeTriggers.includes(t.id)) {
                        activeTriggers.push(t.id);
                    }
                });
            }

            // Aggiorna lo stato delle porte
            toggleDoors(activeTriggers);
        }
        // =========================
        // --- Gestione cambio livello e limiti ---
        // =========================
        function handleLevelChange(player, levels, currentLevelIndex, canvas) {

            let newLevelIndex = currentLevelIndex;
            let enterFromRight = false;

            const level = getWorldLevels(currentWorld)[currentLevelIndex];

            // 🚪 1. CHECK SPECIAL DOOR (PRIORITARIO)
            if (level.specialDoors) {
                for (let door of level.specialDoors) {

                    const platform = level.platforms[door.platformIndex];
                    if (!platform) continue;

                    const doorX = door.x;
                    const doorY = platform.y - door.height;

                    const nearX =
                        player.x > doorX - 30 &&
                        player.x < doorX + door.width + 30;

                    const nearY =
                        Math.abs(player.y - doorY) < 30;

                    if (door.open && nearX && nearY) {
                        triggerWorldChange();
                        return; // 🔥 blocca cambio livello
                    }
                }
            }

            // ➡️ 2. Cambio livello a destra
            if (player.dx > 0 && player.x + player.width >= canvas.width) {

                if (currentLevelIndex < levels.length - 1) {
                    newLevelIndex = currentLevelIndex + 1;
                    enterFromRight = false;
                } else {
                    player.x = canvas.width - player.width;
                }
            }

            // ⬅️ 3. Cambio livello a sinistra
            if (player.dx < 0 && player.x <= 0) {

                if (currentLevelIndex > 0) {
                    newLevelIndex = currentLevelIndex - 1;
                    enterFromRight = true;
                } else {
                    player.x = 0;
                }
            }

            // 👥 4. NPC follow transfer
            if (newLevelIndex !== currentLevelIndex) {
                const nearbyIndexes = getNearbyNPCIndexes(
                    player,
                    getCurrentLevel(),
                    120
                );

                changeLevel(newLevelIndex, nearbyIndexes, enterFromRight);
            }

            // 🧱 5. LIMITI
            player.x = Math.max(0, Math.min(player.x, canvas.width - player.width));
            player.y = Math.max(0, Math.min(player.y, canvas.height - player.height));
        }
        function triggerWorldChange() {

            // 🚫 evita doppi trigger nello stesso frame
            if (worldTransitioning) return;

            worldTransitioning = true;

            // 🌍 lista mondi disponibili dai livelli
            const worldsList = [...new Set(levels.map(l => l.world))];

            const currentIndex = worldsList.indexOf(currentWorld);

            // ➡️ prossimo mondo (loop o stop)
            const nextWorld = worldsList[currentIndex + 1];

            // ❌ se non esiste, blocca
            if (!nextWorld) {
                worldTransitioning = false;
                return;
            }

            // 🌍 cambia mondo
            currentWorld = nextWorld;

            // 📍 reset livello
            currentLevelIndex = 0;

            // 🎬 overlay UI
            showWorldOverlay(currentWorld);

            // ⏳ fine transizione dopo animazione
            setTimeout(() => {
                worldTransitioning = false;
            }, 2000);
        }
        // =========================
        // --- Movimento orizzontale e collisioni porte ---
        // =========================
        function handleHorizontalMovement(player, keys, speed, isPullingLever, isPushingButton, platforms, allDoors) {
            // Rialzati se premi su e non sei sotto una piattaforma
            if (keys.up && !player.isUnderPlatform) {
                player.isCrouching = false;
            }

            // Reset movimento orizzontale
            player.dx = 0;
            let isMoving = false;

            // Movimento solo se non stiamo interagendo con leve o pulsanti
            if (!isPullingLever && !isPushingButton) {
                if (keys.left) {
                    player.dx = -speed;
                    facingRight = false;
                    isMoving = true;
                }
                if (keys.right) {
                    player.dx = speed;
                    facingRight = true;
                    isMoving = true;
                }
            }

            // Calcolo posizione futura con collisione porte
            const nextX = handleDoorCollision(player, platforms, allDoors);

            return { nextX, isMoving };
        }

        function update() {
            // =========================
            // --- Dati correnti livello ---
            // =========================
            const level = getWorldLevels(currentWorld)[currentLevelIndex];
            const platforms = getCurrentPlatforms();
            const ladders = getCurrentLadders();

            // =========================
            // --- Scale ---
            // =========================
            handleLadder(player, platforms, ladders, keys);

            // =========================
            // --- Saluto NPC ---
            // =========================
            handleSayHello(player, level);

            // =========================
            // --- Movimento orizzontale ---
            // =========================
            const { nextX, isMoving } = handleHorizontalMovement(
                player, keys, player.speed, isPullingLever, isPushingButton, platforms, level.doors.concat(level.specialDoors || [])
            );

            // =========================
            // --- Gravità e salto ---
            // =========================
            applyGravity(player, gravity, jumpPressed);

            // Applica la posizione finale orizzontale
            player.x = nextX;

            // =========================
            // --- Animazioni e suoni ---
            // =========================
            imgToDraw = updatePlayerAnimationAndSounds(player, keys, isMoving, facingRight);

            // =========================
            // --- Interazioni leve / pulsanti ---
            // =========================
            handleInteractions(player, keys, platforms, level);
            updateInteractionAnimations();

            // =========================
            // --- Collisioni piattaforme / botole / spike ---
            // =========================
            handleTrapdoorCollisions(player, platforms, level.trapdoors);
            handleEntityPlatformCollisions(player, platforms, level.trapdoors);
            handleSpikeCollisions(player, platforms, level.spikes);

            // =========================
            // --- Porte e trigger ---
            // =========================
            handleTriggers(level);

            // =========================
            // --- Cambio livello e limiti canvas ---
            // =========================
            handleLevelChange(player, levels, currentLevelIndex, canvas);
        }
        function handleWorldChange() {
            if (currentWorld === lastWorld) return;

            lastWorld = currentWorld;

            currentLevelIndex = 0;

            const worldLevels = getWorldLevels(currentWorld);

            if (!worldLevels.length) return;

            showWorldOverlay(currentWorld);
        }
        function deathOfNPC(npc) {
            if (!npc || npc.dead) return;

            npc.dead = true;
            soundPlay('dead');

            // Ferma il movimento dell'NPC
            npc.dx = 0;
            npc.dy = 0;

            // Genera particelle rosse dove si trova l'NPC
            spawnDeathParticles(npc.x, npc.y);

            // Imposta lo stato e il frame di morte
            npc.state = 'dead';
            npc.frameIndex = 0;
            npc.frameCounter = 0;

            // Imposta il frame iniziale della morte
            imgToDraw = npc.facingRight
                ? npcDeathFramesRight[0]
                : npcDeathFramesLeft[0];
        }
        function deathOfPlayer() {
            if (player.dead) return;
            player.dead = true;
            soundPlay('dead')
            // Ferma il movimento
            player.dx = 0;
            player.dy = 0;
            keys.left = false;
            keys.right = false;
            keys.up = false;
            keys.down = false;
            jumpPressed = false;

            // Genera particelle rosse
            spawnDeathParticles(player.x, player.y);

            // Imposta frame morte
            imgToDraw = facingRight ? deathFramesRight[0] : deathFramesLeft[0];
        }

        // =========================
        // --- Draw ---
        // =========================
        function drawButton(button) {
            const platform = getCurrentPlatforms()[button.platformIndex];
            const baseY = platform.y;
            const radius = 5; // arrotondamento bordi quadrati
            const palettoHeight = button.height / 2; // altezza paletto
            const palettoWidth = button.width / 2;
            const palettoX = button.x + button.width / 4;
            const palettoY = baseY - palettoHeight;

            // --- Paletto ---
            ctx.fillStyle = "#2E8B57"; // verde scuro
            ctx.fillRect(palettoX, palettoY, palettoWidth, palettoHeight);

            // --- Corpo pulsante sopra il paletto ---
            const buttonTop = palettoY - button.height;
            const buttonBottom = palettoY;

            if (button.mode === "TRICOLOR") {
                // quadrato arrotondato
                ctx.fillStyle = ["gray", "red", "#32CD32"][button.state || 0];
                ctx.beginPath();
                ctx.moveTo(button.x + radius, buttonTop);
                ctx.lineTo(button.x + button.width - radius, buttonTop);
                ctx.quadraticCurveTo(button.x + button.width, buttonTop, button.x + button.width, buttonTop + radius);
                ctx.lineTo(button.x + button.width, buttonBottom - radius);
                ctx.quadraticCurveTo(button.x + button.width, buttonBottom, button.x + button.width - radius, buttonBottom);
                ctx.lineTo(button.x + radius, buttonBottom);
                ctx.quadraticCurveTo(button.x, buttonBottom, button.x, buttonBottom - radius);
                ctx.lineTo(button.x, buttonTop + radius);
                ctx.quadraticCurveTo(button.x, buttonTop, button.x + radius, buttonTop);
                ctx.closePath();
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.strokeStyle = "#000";
                ctx.stroke();
            } else {
                // pulsante tondo
                ctx.beginPath();
                if (button.mode === "ON") {
                    ctx.fillStyle = button.pressed ? "#90EE90" : "#32CD32"; // verde chiaro se premuto
                } else if (button.mode === "TOGGLE") {
                    ctx.fillStyle = button.pressed ? "#FF6347" : "#32CD32"; // rosso se premuto, giallo altrimenti
                }
                ctx.arc(button.x + button.width / 2, buttonTop + button.height / 2, button.width / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.lineWidth = 1;
                ctx.strokeStyle = "#006400";
                ctx.stroke();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'green';
            const platforms = getCurrentPlatforms();
            const ladders = getCurrentLadders();
            const level = getCurrentLevel();
            platforms.forEach((p, index) => {

                // 🔥 prendi SEMPRE le trapdoor della piattaforma
                const trapdoors = level.trapdoors?.filter(t =>
                    t.platformIndex === index
                ) || [];

                ctx.fillStyle = (p.type === "solid") ? "#333" : "green";

                if (trapdoors.length === 0) {
                    ctx.fillRect(p.x, p.y, p.width, p.height);
                    return;
                }

                trapdoors.sort((a, b) => a.x - b.x);

                let currentX = p.x;

                for (let t of trapdoors) {

                    // 🔥 supporto double
                    const traps = [];

                    if (t.mode === "double") {
                        const spacing = t.width;
                        traps.push({ x: t.x, width: t.width });
                        traps.push({ x: t.x + spacing, width: t.width });
                    } else {
                        traps.push({ x: t.x, width: t.width });
                    }

                    for (let trapPart of traps) {

                        const segmentWidth = trapPart.x - currentX;

                        if (segmentWidth > 0) {
                            ctx.fillRect(currentX, p.y, segmentWidth, p.height);
                        }

                        currentX = trapPart.x + trapPart.width;
                    }
                }

                const remainingWidth = (p.x + p.width) - currentX;

                if (remainingWidth > 0) {
                    ctx.fillRect(currentX, p.y, remainingWidth, p.height);
                }
            });


            if (level.ladders) {
                level.ladders.forEach(t => drawLadders(t));
            }

            if (level.doors) {
                level.doors.forEach(t => drawDoors(t));
            }

            if (level.specialDoors) {
                level.specialDoors.forEach(t => drawSpecialDoors(t, level));
            }
            // Poi disegna le botole sopra la piattaforma
            if (level.trapdoors) {
                level.trapdoors.forEach(t => drawTrapdoor(t));
            }
            // Leva
            if (level.lever && level.lever[0]) drawLever(level.lever[0]);
            //spike
            if (level.spikes) {
                level.spikes.forEach(t => drawSpikes(t));
            }
            // Pulsanti 
            if (level.buttons) {
                level.buttons.forEach(b => drawButton(b));
            }
            // Player
            let imgToDraw;

            // PRIORITÀ: morte, leva, scala, salto, pushButton, rotolata, cammino
            if (player.dead) {  // nuova condizione per morte
                // Gestione animazione morte
                if (!deathFrameCounter) deathFrameCounter = 0;
                if (!deathFrameIndex) deathFrameIndex = 0;

                deathFrameCounter++;
                if (deathFrameCounter >= 5) { // velocità animazione
                    deathFrameIndex++;
                    deathFrameCounter = 0;
                    if (deathFrameIndex >= deathFramesRight.length) deathFrameIndex = deathFramesRight.length - 1; // rimane sull'ultimo frame
                }

                imgToDraw = facingRight
                    ? deathFramesRight[deathFrameIndex]  // frame XX/YY per destra
                    : deathFramesLeft[deathFrameIndex];  // frame XX/YY per sinistra
            } else if (sayHelloTimer > 0) {
                soundPlay('hello')
                // Mostra il frame corretto in base alla direzione
                imgToDraw = facingRight
                    ? sayHelloFramesRight[0]
                    : sayHelloFramesLeft[0];
            } else if (isPullingLever && pullLeverRight[leverFrame]) {
                imgToDraw = facingRight ? pullLeverRight[leverFrame] : pullLeverLeft[leverFrame];
            } else if (player.onLadder) {
                imgToDraw = facingRight ? climbFramesRight[climbFrameIndex] : climbFramesLeft[climbFrameIndex];
            } else if (!player.onGround) {
                imgToDraw = facingRight ? jumpFrameRight : jumpFrameLeft;
            } else if (isPushingButton) {  // <-- aggiunto qui 
                imgToDraw = facingRight
                    ? pushButtonFramesRight[pushButtonFrameIndex]
                    : pushButtonFramesLeft[pushButtonFrameIndex];

            } else if (player.isCrouching) {
                imgToDraw = (player.dx != 0)
                    ? (facingRight ? rollFramesRight[rollFrameIndex] : rollFramesLeft[rollFrameIndex])
                    : (facingRight ? rollIdleRight : rollIdleLeft);
            } else {
                imgToDraw = facingRight ? framesRight[currentFrame] : framesLeft[currentFrame];
            }

            // Disegna il player
            if (imgToDraw) ctx.drawImage(imgToDraw, player.x, player.y, player.width, player.height);

            drawDeathParticles();
        }

        // =========================
        // --- Game Loop ---
        // =========================
        function gameLoop() {

            handleWorldChange();

            update();

            draw();

            const level = getCurrentLevel();

            if (level.npcs) {
                level.npcs.forEach(npc => {
                    updateNPC(npc);
                    drawNPC(npc);
                });
            }

            requestAnimationFrame(gameLoop);
        }


        const map = [
            "-N--------",
            "------__s_",
            "=====-----",
            "----------",
            "__LD_---==",
            "==L=-___h_",
            "---_cbt---",
            "_______wX_",
        ];
        const generatedLevel = parseMultiTileMap(map);

        levels[0] = generatedLevel;
        // Chiama setupActions all’avvio
        setupActions();
        gameLoop();


    </script>
