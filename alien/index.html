<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omino Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game">
        <div class="platform" style="left: 250px; bottom: 100px; width: 100px;"></div>
        <div class="platform" style="left: 450px; bottom: 150px; width: 120px;"></div>
        <div class="platform" style="left: 650px; bottom: 80px; width: 80px;"></div>

        <div id="walker">
            <div id="walkerWrapper">
                <div class="torso"></div>
                <div class="head"></div>
                <div class="arm left-arm"></div>
                <div class="arm right-arm"></div>
                <div class="leg left-leg"></div>
                <div class="leg right-leg"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
